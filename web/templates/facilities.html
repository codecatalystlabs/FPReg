<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facilities – HMIS FP Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{.BasePath}}/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-heart-pulse"></i> FP Register <span class="badge bg-info">v1.0</span></div>
    <nav class="mt-2">
      <div class="nav-section">Main</div>
      <a href="{{.BasePath}}/dashboard" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="{{.BasePath}}/register" class="nav-link"><i class="bi bi-plus-circle"></i> New Entry</a>
      <a href="{{.BasePath}}/submissions" class="nav-link"><i class="bi bi-table"></i> Submissions</a>
      <a href="{{.BasePath}}/guide" class="nav-link"><i class="bi bi-book"></i> Guide</a>
      <div class="nav-section admin-only">Administration</div>
      <a href="{{.BasePath}}/admin/users" class="nav-link admin-only"><i class="bi bi-people"></i> Users</a>
      <a href="{{.BasePath}}/admin/facilities" class="nav-link superadmin-only"><i class="bi bi-hospital"></i> Facilities</a>
      <a href="{{.BasePath}}/admin/audit-logs" class="nav-link admin-only facility-admin-audit"><i class="bi bi-shield-check"></i> Audit Logs</a>
    </nav>
    <div class="user-info">
      <div class="fw-semibold user-name"></div>
      <small class="user-role text-capitalize opacity-75"></small>
      <div class="mt-1"><a href="#" onclick="App.logout()" class="text-danger text-decoration-none" style="font-size:.78rem"><i class="bi bi-box-arrow-left"></i> Sign Out</a></div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <div>
        <button class="btn btn-sm btn-outline-secondary d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list"></i></button>
        <strong>Facility Management</strong>
      </div>
      <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#facilityModal"><i class="bi bi-plus me-1"></i>Add Facility</button>
    </div>

    <div class="content-area">
      <div class="card mb-3">
        <div class="card-body d-flex flex-wrap align-items-center gap-2">
          <div class="flex-grow-1" style="min-width:220px">
            <input type="text" id="facilitySearch" class="form-control form-control-sm" placeholder="Search by name, code, district or subcounty">
          </div>
          <button class="btn btn-sm btn-outline-primary" id="facilitySearchBtn"><i class="bi bi-search me-1"></i>Search</button>
          <button class="btn btn-sm btn-outline-secondary" id="facilityClearSearch"><i class="bi bi-x-circle me-1"></i>Clear</button>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr><th>Name</th><th>Code</th><th>Level</th><th>District</th><th>Prefix</th><th></th></tr>
              </thead>
              <tbody id="facilitiesBody">
                <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
              </tbody>
            </table>
          </div>
          <div class="d-flex justify-content-between align-items-center border-top px-3 py-2">
            <small class="text-muted" id="facilitiesMeta"></small>
            <div class="btn-group btn-group-sm" role="group">
              <button class="btn btn-outline-secondary" id="facilitiesPrev">&laquo; Prev</button>
              <button class="btn btn-outline-secondary" id="facilitiesNext">Next &raquo;</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="facilityModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Add Facility</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <form id="facilityForm">
          <div class="modal-body">
            <div class="mb-3"><label class="form-label">Name *</label><input type="text" class="form-control" id="f_name" required></div>
            <div class="row g-3 mb-3">
              <div class="col-md-6"><label class="form-label">Code *</label><input type="text" class="form-control" id="f_code" required placeholder="e.g. MRRH"></div>
              <div class="col-md-6"><label class="form-label">Client Code Prefix *</label><input type="text" class="form-control" id="f_prefix" required maxlength="5" placeholder="e.g. MRH"></div>
            </div>
            <div class="mb-3"><label class="form-label">Level</label><input type="text" class="form-control" id="f_level" placeholder="e.g. HC IV, RRH"></div>
            <div class="mb-3"><label class="form-label">Subcounty</label><input type="text" class="form-control" id="f_subcounty"></div>
            <div class="mb-3"><label class="form-label">HSD</label><input type="text" class="form-control" id="f_hsd"></div>
            <div class="mb-3"><label class="form-label">District</label><input type="text" class="form-control" id="f_district"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Create Facility</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>window.APP_BASE = '{{.BasePath}}';</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{.BasePath}}/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!App.requireAuth()) return;
      App.initSidebar();

      let currentPage = 1;
      let totalPages = 1;
      let currentSearch = '';

      async function loadFacilities(page = 1) {
        currentPage = page;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page));
          params.set('per_page', '20');
          if (currentSearch.trim()) params.set('search', currentSearch.trim());

          const data = await App.api('GET', '/facilities?' + params.toString());
          const tbody = document.getElementById('facilitiesBody');
          const items = data.data || [];
          if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No facilities</td></tr>';
          } else {
            tbody.innerHTML = items.map(f => `
              <tr>
                <td class="fw-semibold">${f.name}</td>
                <td><code>${f.code}</code></td>
                <td>${f.level || '–'}</td>
                <td>${f.district || '–'}</td>
                <td><code>${f.client_code_prefix}</code></td>
                <td><button class="btn btn-sm btn-outline-danger" onclick="deleteFacility('${f.id}','${f.name}')">Delete</button></td>
              </tr>`).join('');
          }
          const meta = data.meta || {};
          totalPages = meta.total_pages || 1;
          const total = meta.total || items.length;
          const start = ((meta.page || page) - 1) * (meta.per_page || 20) + (items.length ? 1 : 0);
          const end = ((meta.page || page) - 1) * (meta.per_page || 20) + items.length;
          const metaEl = document.getElementById('facilitiesMeta');
          metaEl.textContent = total ? `Showing ${start}-${end} of ${total} facilities` : 'No facilities';

          document.getElementById('facilitiesPrev').disabled = currentPage <= 1;
          document.getElementById('facilitiesNext').disabled = currentPage >= totalPages;
        } catch (e) {
          App.showToast('Failed to load facilities', 'error');
        }
      }
      await loadFacilities(1);

      document.getElementById('facilitySearchBtn').addEventListener('click', () => {
        currentSearch = document.getElementById('facilitySearch').value;
        loadFacilities(1);
      });
      document.getElementById('facilityClearSearch').addEventListener('click', () => {
        document.getElementById('facilitySearch').value = '';
        currentSearch = '';
        loadFacilities(1);
      });
      document.getElementById('facilitySearch').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
          currentSearch = e.target.value;
          loadFacilities(1);
        }
      });
      document.getElementById('facilitiesPrev').addEventListener('click', () => {
        if (currentPage > 1) loadFacilities(currentPage - 1);
      });
      document.getElementById('facilitiesNext').addEventListener('click', () => {
        if (currentPage < totalPages) loadFacilities(currentPage + 1);
      });

      document.getElementById('facilityForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          name: document.getElementById('f_name').value,
          code: document.getElementById('f_code').value,
          client_code_prefix: document.getElementById('f_prefix').value,
          level: document.getElementById('f_level').value,
          subcounty: document.getElementById('f_subcounty').value,
          hsd: document.getElementById('f_hsd').value,
          district: document.getElementById('f_district').value,
        };
        try {
          await App.api('POST', '/facilities', body);
          App.showToast('Facility created');
          bootstrap.Modal.getInstance(document.getElementById('facilityModal')).hide();
          document.getElementById('facilityForm').reset();
          await loadFacilities();
        } catch (err) {
          App.showToast(err.message || 'Failed to create facility', 'error');
        }
      });

      window.deleteFacility = async (id, name) => {
        if (!confirm(`Delete facility "${name}"?`)) return;
        try {
          await App.api('DELETE', `/facilities/${id}`);
          App.showToast('Facility deleted');
          await loadFacilities();
        } catch (err) {
          App.showToast(err.message || 'Failed', 'error');
        }
      };
    });
  </script>
</body>
</html>

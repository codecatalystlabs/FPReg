<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Logs – HMIS FP Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{.BasePath}}/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-heart-pulse"></i> FP Register <span class="badge bg-info">v1.0</span></div>
    <nav class="mt-2">
      <div class="nav-section">Main</div>
      <a href="{{.BasePath}}/dashboard" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="{{.BasePath}}/register" class="nav-link"><i class="bi bi-plus-circle"></i> New Entry</a>
      <a href="{{.BasePath}}/submissions" class="nav-link"><i class="bi bi-table"></i> Submissions</a>
      <a href="{{.BasePath}}/guide" class="nav-link"><i class="bi bi-book"></i> Guide</a>
      <div class="nav-section admin-only">Administration</div>
      <a href="{{.BasePath}}/admin/users" class="nav-link admin-only"><i class="bi bi-people"></i> Users</a>
      <a href="{{.BasePath}}/admin/facilities" class="nav-link superadmin-only"><i class="bi bi-hospital"></i> Facilities</a>
      <a href="{{.BasePath}}/admin/audit-logs" class="nav-link admin-only facility-admin-audit"><i class="bi bi-shield-check"></i> Audit Logs</a>
    </nav>
    <div class="user-info">
      <div class="fw-semibold user-name"></div>
      <small class="user-role text-capitalize opacity-75"></small>
      <div class="mt-1"><a href="#" onclick="App.logout()" class="text-danger text-decoration-none" style="font-size:.78rem"><i class="bi bi-box-arrow-left"></i> Sign Out</a></div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <div>
        <button class="btn btn-sm btn-outline-secondary d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list"></i></button>
        <strong>Audit Logs</strong>
      </div>
    </div>

    <div class="content-area">
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="row g-2 align-items-end">
            <div class="col-md-2">
              <select class="form-select form-select-sm" id="filterAction">
                <option value="">All Actions</option>
                <option value="LOGIN">Login</option>
                <option value="LOGIN_FAILED">Failed Login</option>
                <option value="LOGOUT">Logout</option>
                <option value="CREATE">Create</option>
                <option value="UPDATE">Update</option>
                <option value="DELETE">Delete</option>
                <option value="VIEW">View</option>
              </select>
            </div>
            <div class="col-md-2"><input type="date" class="form-control form-control-sm" id="auditDateFrom"></div>
            <div class="col-md-2"><input type="date" class="form-control form-control-sm" id="auditDateTo"></div>
            <div class="col-auto">
              <button class="btn btn-sm btn-primary" id="auditSearchBtn"><i class="bi bi-search"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover table-sm mb-0">
              <thead>
                <tr><th>Time</th><th>Action</th><th>Entity</th><th>Detail</th><th>User</th><th>IP</th></tr>
              </thead>
              <tbody id="auditBody">
                <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <span class="text-muted" style="font-size:.8rem">Total: <span id="auditTotal">0</span></span>
          <div id="auditPagination"></div>
        </div>
      </div>
    </div>
  </div>

  <script>window.APP_BASE = '{{.BasePath}}';</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{.BasePath}}/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!App.requireAuth()) return;
      App.initSidebar();

      let page = 1;
      const perPage = 50;

      await loadLogs();
      document.getElementById('auditSearchBtn').addEventListener('click', () => { page = 1; loadLogs(); });

      async function loadLogs() {
        const params = new URLSearchParams({ page, per_page: perPage });
        const action = document.getElementById('filterAction').value;
        if (action) params.set('action', action);
        const from = document.getElementById('auditDateFrom').value;
        if (from) params.set('date_from', from);
        const to = document.getElementById('auditDateTo').value;
        if (to) params.set('date_to', to);

        try {
          const data = await App.api('GET', '/audit-logs?' + params.toString());
          const items = data.data || [];
          const meta = data.meta;
          document.getElementById('auditTotal').textContent = meta?.total || 0;

          const tbody = document.getElementById('auditBody');
          if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No logs found</td></tr>';
            return;
          }

          const actionColors = {
            LOGIN: 'success', LOGIN_FAILED: 'danger', LOGOUT: 'secondary',
            CREATE: 'primary', UPDATE: 'warning', DELETE: 'danger',
            VIEW: 'info', ADMIN_ACTION: 'dark', TOKEN_REFRESH: 'secondary'
          };

          tbody.innerHTML = items.map(l => `
            <tr>
              <td style="font-size:.78rem">${new Date(l.created_at).toLocaleString()}</td>
              <td><span class="badge bg-${actionColors[l.action] || 'secondary'}">${l.action}</span></td>
              <td>${l.entity || '–'}</td>
              <td style="font-size:.8rem;max-width:250px" class="text-truncate">${l.detail || l.entity_id || '–'}</td>
              <td style="font-size:.78rem">${l.user_id ? l.user_id.substring(0,8) + '...' : '–'}</td>
              <td style="font-size:.78rem">${l.ip_address || '–'}</td>
            </tr>`).join('');
        } catch (e) {
          App.showToast('Failed to load audit logs', 'error');
        }
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – HMIS FP Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="card login-card">
      <div class="card-header">
        <i class="bi bi-heart-pulse fs-2 d-block mb-2"></i>
        <h5 class="mb-1">HMIS MCH 007</h5>
        <small class="opacity-75">Integrated Family Planning Register</small>
      </div>
      <div class="card-body p-4">
        <div id="loginError" class="alert alert-danger d-none py-2" role="alert"></div>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" placeholder="user@moh.go.ug" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>
      </div>
      <div class="card-footer text-center text-muted py-3" style="font-size:.78rem">
        Ministry of Health &middot; Uganda
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>

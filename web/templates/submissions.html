<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submissions – HMIS FP Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{.BasePath}}/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-heart-pulse"></i> FP Register <span class="badge bg-info">v1.0</span></div>
    <nav class="mt-2">
      <div class="nav-section">Main</div>
      <a href="{{.BasePath}}/dashboard" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="{{.BasePath}}/register" class="nav-link"><i class="bi bi-plus-circle"></i> New Entry</a>
      <a href="{{.BasePath}}/submissions" class="nav-link"><i class="bi bi-table"></i> Submissions</a>
      <a href="{{.BasePath}}/guide" class="nav-link"><i class="bi bi-book"></i> Guide</a>
      <div class="nav-section admin-only">Administration</div>
      <a href="{{.BasePath}}/admin/users" class="nav-link admin-only"><i class="bi bi-people"></i> Users</a>
      <a href="{{.BasePath}}/admin/facilities" class="nav-link superadmin-only"><i class="bi bi-hospital"></i> Facilities</a>
      <a href="{{.BasePath}}/admin/audit-logs" class="nav-link admin-only facility-admin-audit"><i class="bi bi-shield-check"></i> Audit Logs</a>
    </nav>
    <div class="user-info">
      <div class="fw-semibold user-name"></div>
      <small class="user-role text-capitalize opacity-75"></small>
      <div class="mt-1"><a href="#" onclick="App.logout()" class="text-danger text-decoration-none" style="font-size:.78rem"><i class="bi bi-box-arrow-left"></i> Sign Out</a></div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <div>
        <button class="btn btn-sm btn-outline-secondary d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list"></i></button>
        <strong>Submissions</strong>
        <span class="badge bg-primary ms-2" id="totalCount">0</span>
      </div>
      <a href="{{.BasePath}}/register" class="btn btn-sm btn-success"><i class="bi bi-plus me-1"></i>New Entry</a>
    </div>

    <div class="content-area">
      <!-- Filters -->
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="row g-2 align-items-end">
            <div class="col-md-3">
              <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search name, NIN, client #...">
            </div>
            <div class="col-md-2">
              <input type="date" class="form-control form-control-sm" id="filterDateFrom" placeholder="From">
            </div>
            <div class="col-md-2">
              <input type="date" class="form-control form-control-sm" id="filterDateTo" placeholder="To">
            </div>
            <div class="col-md-2">
              <select class="form-select form-select-sm" id="filterSex">
                <option value="">All Sex</option>
                <option value="F">Female</option>
                <option value="M">Male</option>
              </select>
            </div>
            <div class="col-auto">
              <button class="btn btn-sm btn-primary" id="searchBtn"><i class="bi bi-search"></i> Search</button>
              <button class="btn btn-sm btn-outline-secondary" id="clearFilters"><i class="bi bi-x"></i> Clear</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>S/N</th>
                  <th>Client #</th>
                  <th>Name</th>
                  <th>Sex</th>
                  <th>Age</th>
                  <th>Visit Date</th>
                  <th>Type</th>
                  <th>HTS</th>
                  <th>Phone</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="submissionsBody"></tbody>
            </table>
          </div>
        </div>
        <div class="card-footer d-flex justify-content-end" id="pagination"></div>
      </div>
    </div>
  </div>

  <script>window.APP_BASE = '{{.BasePath}}';</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{.BasePath}}/static/js/app.js"></script>
  <script src="{{.BasePath}}/static/js/submissions.js"></script>
</body>
</html>

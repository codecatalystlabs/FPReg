<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users – HMIS FP Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="brand"><i class="bi bi-heart-pulse"></i> FP Register <span class="badge bg-info">v1.0</span></div>
    <nav class="mt-2">
      <div class="nav-section">Main</div>
      <a href="/dashboard" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="/register" class="nav-link"><i class="bi bi-plus-circle"></i> New Entry</a>
      <a href="/submissions" class="nav-link"><i class="bi bi-table"></i> Submissions</a>
      <a href="/guide" class="nav-link"><i class="bi bi-book"></i> Guide</a>
      <div class="nav-section admin-only">Administration</div>
      <a href="/admin/users" class="nav-link admin-only"><i class="bi bi-people"></i> Users</a>
      <a href="/admin/facilities" class="nav-link superadmin-only"><i class="bi bi-hospital"></i> Facilities</a>
      <a href="/admin/audit-logs" class="nav-link admin-only"><i class="bi bi-shield-check"></i> Audit Logs</a>
    </nav>
    <div class="user-info">
      <div class="fw-semibold user-name"></div>
      <small class="user-role text-capitalize opacity-75"></small>
      <div class="mt-1"><a href="#" onclick="App.logout()" class="text-danger text-decoration-none" style="font-size:.78rem"><i class="bi bi-box-arrow-left"></i> Sign Out</a></div>
    </div>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <div>
        <button class="btn btn-sm btn-outline-secondary d-lg-none me-2" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list"></i></button>
        <strong>User Management</strong>
      </div>
      <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#userModal"><i class="bi bi-plus me-1"></i>Add User</button>
    </div>

    <div class="content-area">
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr><th>Name</th><th>Email</th><th>Role</th><th>Facility</th><th>Active</th><th></th></tr>
              </thead>
              <tbody id="usersBody">
                <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create User Modal -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="userForm">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Full Name *</label>
              <input type="text" class="form-control" id="u_full_name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email *</label>
              <input type="email" class="form-control" id="u_email" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password *</label>
              <input type="password" class="form-control" id="u_password" minlength="8" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Role *</label>
              <select class="form-select" id="u_role" required>
                <option value="facility_user">Facility User</option>
                <option value="facility_admin">Facility Admin</option>
                <option value="reviewer">Reviewer</option>
                <option value="superadmin">Super Admin</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Facility *</label>
              <select class="form-select" id="u_facility_id"></select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Create User</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!App.requireAuth()) return;
      App.initSidebar();

      async function loadUsers() {
        try {
          const data = await App.api('GET', '/users?per_page=100');
          const tbody = document.getElementById('usersBody');
          const users = data.data || [];
          if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No users</td></tr>';
            return;
          }
          tbody.innerHTML = users.map(u => `
            <tr>
              <td class="fw-semibold">${u.full_name}</td>
              <td>${u.email}</td>
              <td><span class="badge bg-secondary text-capitalize">${u.role}</span></td>
              <td>${u.facility ? u.facility.name : '–'}</td>
              <td>${u.is_active ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-danger">Inactive</span>'}</td>
              <td>
                ${u.is_active ? `<button class="btn btn-sm btn-outline-danger" onclick="deactivateUser('${u.id}')">Deactivate</button>` : ''}
              </td>
            </tr>`).join('');
        } catch (e) {
          App.showToast('Failed to load users', 'error');
        }
      }

      // Load facilities for the dropdown
      try {
        const data = await App.api('GET', '/facilities?per_page=100');
        const sel = document.getElementById('u_facility_id');
        sel.innerHTML = '<option value="">Select facility</option>';
        (data.data || []).forEach(f => {
          sel.innerHTML += `<option value="${f.id}">${f.name} (${f.code})</option>`;
        });
      } catch (e) {}

      await loadUsers();

      document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const facilityVal = document.getElementById('u_facility_id').value;
        const body = {
          full_name: document.getElementById('u_full_name').value,
          email: document.getElementById('u_email').value,
          password: document.getElementById('u_password').value,
          role: document.getElementById('u_role').value,
        };
        if (facilityVal) body.facility_id = facilityVal;
        try {
          await App.api('POST', '/users', body);
          App.showToast('User created');
          bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
          document.getElementById('userForm').reset();
          await loadUsers();
        } catch (err) {
          App.showToast(err.message || 'Failed to create user', 'error');
        }
      });

      window.deactivateUser = async (id) => {
        if (!confirm('Deactivate this user?')) return;
        try {
          await App.api('PATCH', `/users/${id}/deactivate`);
          App.showToast('User deactivated');
          await loadUsers();
        } catch (err) {
          App.showToast(err.message || 'Failed', 'error');
        }
      };
    });
  </script>
</body>
</html>
